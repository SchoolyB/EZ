# Auto-label PRs based on paths changed
# Used by .github/workflows/auto-label.yml

# Compiler components
grayc:
  - changed-files:
      - any-glob-to-any-file: "grayc/**"

lexer:
  - changed-files:
      - any-glob-to-any-file: "grayc/src/lexer/**"

parser:
  - changed-files:
      - any-glob-to-any-file: "grayc/src/parser/**"

typechecker:
  - changed-files:
      - any-glob-to-any-file: "grayc/src/typechecker/**"

stdlib:
  - changed-files:
      - any-glob-to-any-file:
          - "grayc/src/stdlib/**"

error-messages:
  - changed-files:
      - any-glob-to-any-file:
          - "grayc/src/util/error_codes.h"
          - "ERRORS.md"

# Go CLI
cli:
  - changed-files:
      - any-glob-to-any-file:
          - "cli/**"
          - "pkg/**"

# Tests
tests:
  - changed-files:
      - any-glob-to-any-file:
          - "grayc/tests/**"
          - "integration-tests/**"
          - "**/*_test.go"

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

# CI/CD
CI/CD:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/labeler.yml"
          - "Makefile"

# Module system (imports, multi-file resolution, name rewriting)
module-system:
  - changed-files:
      - any-glob-to-any-file:
          - "grayc/src/main.c"

# Dependencies
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "go.mod"
          - "go.sum"
