name: CI

on:
  push:
    branches:
      - main
      - v3.0.0
  pull_request:
    branches:
      - main
      - v3.0.0

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      # ===== Go CLI =====
      - name: Create embed stubs
        run: make stubs

      - name: Build ez CLI
        run: go build -o ez ./cmd/ez

      - name: Run Go unit tests
        run: go test ./pkg/lineeditor/...

      # ===== EZ Compiler =====
      - name: Build EZ compiler
        run: |
          cd ezc
          make clean
          make build

      - name: Run EZ unit tests (lexer + parser + typechecker)
        continue-on-error: true
        run: |
          cd ezc
          make test-unit

      - name: Run EZ end-to-end tests
        continue-on-error: true
        run: |
          cd ezc
          make test-e2e

      - name: Run EZ integration tests (core + stdlib + named returns)
        continue-on-error: true
        run: |
          cd ezc
          make test-integration

      - name: Run EZ UBSan tests
        continue-on-error: true
        run: |
          cd ezc
          make test-ubsan

      - name: Run EZ ASan tests (Linux only)
        if: runner.os == 'Linux'
        continue-on-error: true
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          cd ezc
          make test-asan
