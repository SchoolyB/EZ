name: CI

on:
  push:
    branches:
      - main
      - release
      - v3.0.0
  pull_request:
    branches:
      - main
      - v3.0.0

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      # ===== Go CLI =====
      - name: Build ez CLI
        run: go build -o ez ./cmd/ez
        if: runner.os != 'Windows'

      - name: Build ez CLI (Windows)
        run: go build -o ez.exe ./cmd/ez
        if: runner.os == 'Windows'

      - name: Run Go unit tests
        if: runner.os != 'Windows'
        run: go test ./pkg/errors/... ./pkg/lineeditor/...

      - name: Run Go unit tests (Windows — skip lineeditor)
        if: runner.os == 'Windows'
        run: go test ./pkg/errors/...

      # ===== EZC Compiler =====
      - name: Build EZC compiler
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make clean
          make build

      - name: Run EZC unit tests (lexer + parser + typechecker)
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-unit

      - name: Run EZC end-to-end tests (65 codegen tests)
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-e2e

      - name: Run EZC integration tests (core + stdlib + named returns)
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-integration

      - name: Run EZC UBSan tests
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-ubsan

      - name: Run EZC ASan tests (Linux only)
        if: runner.os == 'Linux'
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          cd ezc
          make test-asan

      - name: Compile all examples with EZC
        if: runner.os != 'Windows'
        run: |
          for file in examples/basic/*.ez; do
            name=$(basename "$file" .ez)
            # Skip known issues
            if [ "$name" = "function_references" ]; then continue; fi
            if [ "$name" = "references" ]; then continue; fi
            echo "Compiling $file..."
            ./ezc/ezc "$file" -o "/tmp/ezc_$(basename $file .ez)" || exit 1
          done
          for file in examples/ezc/*.ez; do
            echo "Compiling EZC-only $file..."
            ./ezc/ezc "$file" -o "/tmp/ezc_$(basename $file .ez)" || exit 1
          done
          echo "All examples compiled successfully"
