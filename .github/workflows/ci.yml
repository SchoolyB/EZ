name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache C build artifacts
        uses: actions/cache@v4
        with:
          path: |
            grayc/src/**/*.o
            grayc/src/**/*.d
          key: c-objects-${{ runner.os }}-${{ hashFiles('grayc/src/**/*.c', 'grayc/src/**/*.h') }}

      - name: Build
        run: make build

      - name: Run Go unit tests
        run: make test-go

      - name: Run Grayscale unit tests (lexer + parser + typechecker)
        continue-on-error: true
        run: make test-unit

      - name: Run Grayscale end-to-end tests
        continue-on-error: true
        run: make test-e2e

      - name: Run Grayscale integration tests
        continue-on-error: true
        run: make test-integration

      - name: Run Grayscale UBSan tests
        continue-on-error: true
        run: make test-ubsan

      - name: Run Grayscale ASan tests (Linux only)
        if: runner.os == 'Linux'
        continue-on-error: true
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: make test-asan
