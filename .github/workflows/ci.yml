name: CI

on:
  push:
    branches:
      - main
      - release
      - v3.0.0
  pull_request:
    branches:
      - main
      - v3.0.0

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build interpreter
        run: go build -o ez ./cmd/ez
        if: runner.os != 'Windows'

      - name: Build interpreter (Windows)
        run: go build -o ez.exe ./cmd/ez
        if: runner.os == 'Windows'

      - name: Run Go unit tests
        if: runner.os != 'Windows'
        run: go test ./pkg/...

      - name: Run Go unit tests (Windows — skip lineeditor)
        if: runner.os == 'Windows'
        shell: bash
        run: go test $(go list ./pkg/... | grep -v lineeditor)

      - name: Run integration tests
        if: runner.os != 'Windows'
        run: bash integration-tests/run_tests.sh

      - name: Validate example files
        if: runner.os != 'Windows'
        run: |
          for file in examples/basic/*.ez; do
            echo "Validating $file..."
            ./ez "$file" || exit 1
          done

      - name: Validate example files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem examples\basic\*.ez | ForEach-Object {
            Write-Host "Validating $_..."
            & .\ez.exe $_.FullName
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      # ===== EZC Compiler =====
      - name: Build EZC compiler
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make clean
          make build

      - name: Run EZC unit tests
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-unit

      - name: Run EZC end-to-end tests
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-e2e

      - name: Run EZC UBSan tests
        if: runner.os != 'Windows'
        run: |
          cd ezc
          make test-ubsan

      - name: Run EZC ASan tests (Linux only)
        if: runner.os == 'Linux'
        run: |
          cd ezc
          make test-asan

      - name: Compile all examples with EZC
        if: runner.os != 'Windows'
        run: |
          for file in examples/basic/*.ez; do
            name=$(basename "$file" .ez)
            # Skip known OOM issue with FCF + arrays.append
            if [ "$name" = "function_references" ]; then continue; fi
            echo "Compiling $file..."
            ./ezc/ezc "$file" -o "/tmp/ezc_$(basename $file .ez)" || exit 1
          done
          for file in examples/ezc/*.ez; do
            echo "Compiling EZC-only $file..."
            ./ezc/ezc "$file" -o "/tmp/ezc_$(basename $file .ez)" || exit 1
          done
          echo "All examples compiled successfully"

      # ===== Interpreter REPL =====
      - name: Test REPL basic functionality (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Testing REPL..."
          echo -e "mut x int = 5\nx + 10\nexit" | timeout 5 ./ez repl | grep -q "15"

      - name: Test REPL basic functionality (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Testing REPL..."
          # macOS doesn't have timeout, use a subshell with background process
          (echo -e "mut x int = 5\nx + 10\nexit" | ./ez repl > /tmp/repl_output.txt) &
          pid=$!
          sleep 5
          kill $pid 2>/dev/null || true
          grep -q "15" /tmp/repl_output.txt

      - name: Test REPL basic functionality (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Testing REPL..."
          "mut x int = 5", "x + 10", "exit" | & .\ez.exe repl
