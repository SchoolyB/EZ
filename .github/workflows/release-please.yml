name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  # Smart auto-merge: only auto-merge release PRs with user-facing changes
  auto-merge-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if PR should auto-merge
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ fromJson(needs.release-please.outputs.pr).number }}
        run: |
          echo "Checking release PR #$PR_NUMBER for auto-merge eligibility..."

          # Get PR body (contains changelog)
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')

          SHOULD_RELEASE=false

          # Check changelog sections for user-facing changes
          # These are generated from conventional commit prefixes:
          # feat:, fix:, perf:, revert:, hotfix:, bugfix:, patch:, feature:
          if echo "$PR_BODY" | grep -qE "^### (Features|Bug Fixes|Performance Improvements|Reverts)"; then
            echo "Found user-facing changes in changelog (Features/Bug Fixes/Perf/Reverts)"
            SHOULD_RELEASE=true
          fi

          # Also check for commit prefixes directly in the PR body
          # This catches non-standard prefixes that might be included
          if [ "$SHOULD_RELEASE" = "false" ]; then
            if echo "$PR_BODY" | grep -qiE "\* (feat|fix|hotfix|bugfix|patch|feature|perf|revert)(\(.+\))?:"; then
              echo "Found release-worthy commit prefix in changelog"
              SHOULD_RELEASE=true
            fi
          fi

          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "should_merge=true" >> $GITHUB_OUTPUT
            echo "✅ PR qualifies for auto-merge"
          else
            echo "should_merge=false" >> $GITHUB_OUTPUT
            echo "⏸️ PR contains only internal changes (chore/docs/refactor/etc), skipping auto-merge"
            echo "   Release PR will stay open until a feat/fix/hotfix commit is added"
          fi

      - name: Enable auto-merge
        if: steps.check.outputs.should_merge == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          PR_NUMBER: ${{ fromJson(needs.release-please.outputs.pr).number }}
        run: |
          echo "Enabling auto-merge for PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --auto --squash
          echo "✅ Auto-merge enabled - PR will merge when CI passes"

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            grayc_arch: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            grayc_arch: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            grayc_arch: darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            grayc_arch: darwin-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # #1461: single-binary release. Build grayc first, stage into the
      # embed directory, then `go build` so the Go CLI bakes the compiler
      # and runtime in as assets.
      - name: Build Grayscale compiler
        run: |
          cd grayc
          make clean
          make build

      - name: Create embed stubs
        run: make stubs

      - name: Stage embedded runtime assets
        shell: bash
        run: |
          cp grayc/grayc internal/grayc/runtime/grayc
          cp grayc/libgrayrt.a internal/grayc/runtime/libgrayrt.a
          cp grayc/src/runtime/*.h grayc/src/runtime/*.c internal/grayc/runtime/src/runtime/
          cp grayc/src/stdlib/*.h grayc/src/stdlib/*.c internal/grayc/runtime/src/stdlib/

      - name: Build Grayscale CLI (with embedded runtime)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          go build -ldflags "-X main.Version=${TAG} -X main.BuildTime=${BUILD_TIME}" -o gray ./cli
        shell: bash

      - name: Package single-binary release
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ARCH="${{ matrix.grayc_arch }}"
          mkdir -p staging dist
          cp gray staging/
          tar czf "dist/gray-${ARCH}.tar.gz" -C staging .

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        shell: bash
        run: |
          for f in dist/*.tar.gz; do
            [ -f "$f" ] && gh release upload "$TAG_NAME" "$f" --clobber
          done

  # WASM playground update is disabled — the interpreter has been removed.
  # The playground will be ported to Emscripten (grayc + TCC compiled to WASM)
  # in a future release. The pre-built gray.wasm from v2.x still works.
