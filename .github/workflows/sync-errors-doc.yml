name: Sync ERRORS.md

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ezc/src/util/error_codes.h'
  push:
    branches:
      - main
    paths:
      - 'ERRORS.md'

jobs:
  sync:
    name: Regenerate ERRORS.md
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ERRORS.md from error_codes.h
        run: bash scripts/generate_errors.sh

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet ERRORS.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes to PR
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ERRORS.md
          git commit -m "docs: regenerate ERRORS.md from error_codes.h"
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}

  trigger-docs:
    name: Trigger docs sync
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Trigger docs sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_REPO_TOKEN }}" \
            https://api.github.com/repos/grayscale-lang/grayscale-lang.github.io/dispatches \
            -d '{"event_type":"sync-errors"}'
